<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Fruitables - Register Page</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="" name="keywords">
    <meta content="" name="description">

    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Raleway:wght@600;800&display=swap"
        rel="stylesheet">

    <!-- Icon Font Stylesheet -->
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Libraries Stylesheet -->
    <link href="lib/lightbox/css/lightbox.min.css" rel="stylesheet">
    <link href="lib/owlcarousel/assets/owl.carousel.min.css" rel="stylesheet">


    <!-- Customized Bootstrap Stylesheet -->
    <link href="css/bootstrap.min.css" rel="stylesheet">

    <!-- Template Stylesheet -->
    <link href="css/style.css" rel="stylesheet">

    <style>
        {% include "lib/lightbox/css/lightbox.min.css" %}
        {% include "lib/owlcarousel/assets/owl.carousel.min.css" %}
        {% include "css/bootstrap.min.css" %}
        {% include "css/style.css" %}


        #divcontainer {
            height: auto;
            background-color: #d1d0d0;
            padding-top: 30px;
            padding-bottom: 30px;
            margin-top: 30px;
            margin-bottom: 40px;
            margin-left: 250px;
            margin-right: 250px;
            border-radius: calc(15px);
        }

        .lables {
            font-family: "Microsoft Himalaya", sans-serif;
            font-size: 50px;
            color: black;
            font-weight: 550;
            padding-left: 65px;
        }

        .inputbox {

            width: 400px;
            height: 55px;
            border-color: white;
            border-style: solid;
            border-radius: calc(7px);
            margin-top: 20px;
            margin-bottom: 20px;
            margin-right: 150px;
            font-family: 'Times New Roman', Times, serif;
            font-size: 25px;

        }

        #submitbtn {

            color: white;
            margin-left: 100%;
            margin-top: 40px;
            width: 300px;
            height: 45px;
            font-size: 27px;
            font-weight: bold;
            font-family: 'Times New Roman', Times, serif;
            border-radius: calc(10px);
            background-color: #0e78ff;
            border-color: #0e78ff;
            border-style: solid;
            border-width: 3px;
        }


        #submitbtn:hover {
            background-color: rgba(99, 243, 80, 0.86);
            color: black;
            border-color: rgba(99, 243, 80, 0.86);
            border-style: solid;
            font-size: 27px;
            font-weight: bold;
            border-width: 3px;
        }
    </style>
</head>

<body>

    <!-- Spinner Start -->
    <div id="spinner"
        class="show w-100 vh-100 bg-white position-fixed translate-middle top-50 start-50  d-flex align-items-center justify-content-center">
        <div class="spinner-grow text-primary" role="status"></div>
    </div>
    <!-- Spinner End -->


    <!-- Navbar start -->
    <div class="container-fluid fixed-top">
        <div class="container topbar bg-primary d-none d-lg-block">
            <div class="d-flex justify-content-between">
                <div class="top-info ps-2">
                    <small class="me-3"><i class="fas fa-map-marker-alt me-2 text-secondary"></i> <a href="#"
                            class="text-white"> velur, East street ,Namkkal</a></small>
                    <small class="me-3"><i class="fas fa-envelope me-2 text-secondary"></i><a href="#"
                            class="text-white">velurfruit814@gmail.com</a></small>
                </div>
                <div class="top-link pe-2">
                    <a href="/privacypolicy" class="text-white"><small class="text-white mx-2">Privacy
                            Policy</small>/</a>
                    <a href="/termsuser" class="text-white"><small class="text-white mx-2">Terms of Use</small>/</a>
                    <a href="/salesrefunds" class="text-white"><small class="text-white ms-2">Sales and
                            Refunds</small></a>
                </div>
            </div>
        </div>
    </div>
    <!-- Navbar End -->

    <!-- Single Page Header start -->
    <div class="container-fluid page-header py-5">
        <h1 class="text-center text-white display-6">Register form</h1>
    </div>
    <!-- Single Page Header End -->

    <!-- form login start -->
    <div id="divcontainer">
        <form method="post">
            <table>

                <tr>

                    <td><label class="lables">First Name</label></td>
                    <td><input type="text" name="firstname" placeholder="First Name" class="inputbox" required></td>

                </tr>

                <tr>

                    <td><label class="lables">Last Name</label></td>
                    <td><input type="text" name="lastname" placeholder="Last Name" class="inputbox" required></td>

                </tr>

                <tr>

                    <td><label class="lables">E-mail</label></td>
                    <td><input type="text" name="email" placeholder="Email Address" class="inputbox" required></td>

                </tr>

                <tr>

                    <td><label class="lables">Phone No</label></td>
                    <td><input type="text" name="phoneno" placeholder="phone No" class="inputbox" required></td>

                </tr>

                <tr>

                    <td><label class="lables">User Name</label></td>
                    <td><input type="text" name="username" placeholder="Username" class="inputbox" required></td>

                </tr>

                <tr>
                    <td><label class="lables">Password</label></td>
                    <td><input type="password" name="password" placeholder="password" class="inputbox" required></td>

                </tr>

                <tr>
                    <td><label class="lables">confirmPassword</label></td>
                    <td><input type="password" name="confirmpassword" placeholder="confirmpassword" class="inputbox"
                            required></td>

                </tr>

                <td><input type="submit" id="submitbtn" value="SUBMIT"></td>
            </table>
        </form>
    </div>

    <!-- form login End -->


    <!-- Copyright Start -->
    <div class="container-fluid copyright bg-dark py-4">
        <div class="container">
            <div class="row">
                <div class="col-md-6 text-center text-md-start mb-3 mb-md-0">
                    <span class="text-light"><a href="#"><i class="fas fa-copyright text-light me-2"></i>Fruitables</a>, All right reserved.</span>
                </div>
                <div class="col-md-6 my-auto text-center text-md-end text-white">
                    <!--/*** This template is free as long as you keep the below author’s credit link/attribution link/backlink. ***/-->
                    <!--/*** If you'd like to use the template without the below author’s credit link/attribution link/backlink, ***/-->
                    <!--/*** you can purchase the Credit Removal License from "https://htmlcodex.com/credit-removal". ***/-->
                </div>
            </div>
        </div>
    </div>
    <!-- Copyright End -->



    <!-- Back to Top -->
    <a href="#" class="btn btn-primary border-3 border-primary rounded-circle back-to-top"><i
            class="fa fa-arrow-up"></i></a>


    <!-- JavaScript Libraries -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="lib/easing/easing.min.js"></script>
    <script src="lib/waypoints/waypoints.min.js"></script>
    <script src="lib/lightbox/js/lightbox.min.js"></script>
    <script src="lib/owlcarousel/owl.carousel.min.js"></script>

    <!-- Template Javascript -->
    <script src="js/main.js"></script>

    <script>
        {% include "lib/easing/easing.min.js" %}
        {% include "lib/waypoints/waypoints.min.js" %}
        {% include "lib/lightbox/js/lightbox.min.js" %}
        {% include "lib/owlcarousel/owl.carousel.min.js" %}
        {% include "js/main.js" %}
    </script>
</body>

</html>
